# 앱 저장소에 복사: .github/workflows/sbom-checker.yml
name: Z-BOM
on:
  pull_request: {}

permissions:
  contents: read
  pull-requests: write # PR 코멘트 작성

jobs:
  sbom_checker:
    runs-on: [self-hosted, zbom] # 사내망의 온프레미스 Z-BOM에 도달 가능한 러너 (GitHub-hosted 러너 불가)
    steps:
      - uses: actions/checkout@v4 # git archive를 위해 체크아웃 필요
      - uses: ZIEN-TF/z-bom-action@v1.0.0
        with:
          url: ${{ secrets.Z_BOM_URL }}
          token: ${{ secrets.Z_BOM_TOKEN }}
          type: code # code | firmware
          fail-on: none # critical | high | medium | low | none
