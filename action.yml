name: "Z-BOM SBOM Checker"
description: "Submit source to Z-BOM, wait for the scan, and report SBOM/CVE results on the PR."
branding:
  icon: shield
  color: purple

inputs:
  url:
    description: "Z-BOM server URL (e.g. http://z-bom:8000)"
    required: true
  web-url:
    description: "Z-BOM web UI base for the report link (defaults to url)"
    required: false
    default: ""
  token:
    description: "Z-BOM CI token (store as the Z_BOM_TOKEN secret)"
    required: true
  type:
    description: "Scan type: code | firmware"
    required: false
    default: "code"
  path:
    description: "Source path to archive (git-tracked files under this path)"
    required: false
    default: "."
  wait:
    description: "Wait for the scan to finish and report results"
    required: false
    default: "true"
  timeout:
    description: "Max seconds to wait for completion"
    required: false
    default: "1800"
  poll-interval:
    description: "Seconds between status polls"
    required: false
    default: "10"
  fail-on:
    description: "Fail the job if a CVE of this severity or higher is found: critical | high | medium | low | none"
    required: false
    default: "none"
  comment:
    description: "Upsert a PR comment with the result"
    required: false
    default: "true"
  github-token:
    description: "Token used to post the PR comment"
    required: false
    default: ${{ github.token }}

outputs:
  run-id:
    description: "Z-BOM analysis run id"
    value: ${{ steps.zbom.outputs.run-id }}
  status:
    description: "Final run status (COMPLETED | FAILED | ...)"
    value: ${{ steps.zbom.outputs.status }}
  total-cve:
    description: "Number of CVEs needing response"
    value: ${{ steps.zbom.outputs.total-cve }}
  result-json:
    description: "Full result summary JSON"
    value: ${{ steps.zbom.outputs.result-json }}

runs:
  using: composite
  steps:
    - id: zbom
      shell: bash
      run: ${{ github.action_path }}/entrypoint.sh
      env:
        ZBOM_URL: ${{ inputs.url }}
        ZBOM_WEB_URL: ${{ inputs.web-url }}
        ZBOM_TOKEN: ${{ inputs.token }}
        ZBOM_TYPE: ${{ inputs.type }}
        ZBOM_PATH: ${{ inputs.path }}
        ZBOM_WAIT: ${{ inputs.wait }}
        ZBOM_TIMEOUT: ${{ inputs.timeout }}
        ZBOM_POLL_INTERVAL: ${{ inputs.poll-interval }}
        ZBOM_FAIL_ON: ${{ inputs.fail-on }}
        ZBOM_COMMENT: ${{ inputs.comment }}
        GH_TOKEN: ${{ inputs.github-token }}
        # --- GitHub context ---
        ZBOM_REPO: ${{ github.repository }}
        ZBOM_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        ZBOM_BRANCH: ${{ github.head_ref || github.ref_name }}
        ZBOM_TRIGGER: "${{ github.event_name }}${{ github.event.action && format(': {0}', github.event.action) || '' }}"
        ZBOM_PR: ${{ github.event.pull_request.number }}
        GITHUB_API_URL: ${{ github.api_url }}
